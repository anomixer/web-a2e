<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Apple //e Emulator</title>
        <link rel="stylesheet" href="/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="app">
            <header>
                <div class="header-left">
                    <div class="logo">
                        <span class="logo-text">Apple //e</span>
                    </div>
                    <span class="tagline">Apple II Enhanced Emulator</span>
                </div>
                <nav class="header-controls">
                    <div class="control-group">
                        <button
                            id="btn-power"
                            class="control-btn power-btn off"
                            title="Power On"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.8 0" />
                            </svg>
                        </button>
                        <button
                            id="btn-warm-reset"
                            class="control-btn"
                            title="Warm Reset (preserves memory)"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
                                />
                                <path d="M3 3v5h5" />
                            </svg>
                        </button>
                        <button
                            id="btn-cold-reset"
                            class="control-btn"
                            title="Cold Reset (full restart)"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path d="M21 12a9 9 0 1 1-9-9" />
                                <path d="M21 3v6h-6" />
                            </svg>
                        </button>
                    </div>
                    <div class="control-group">
                        <button
                            id="btn-fullscreen"
                            class="control-btn"
                            title="Fullscreen"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                                />
                            </svg>
                        </button>
                        <div class="sound-control-wrapper">
                            <button
                                id="btn-sound"
                                class="control-btn"
                                title="Sound Settings"
                            >
                                <svg
                                    class="icon-unmuted"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                    <path
                                        d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"
                                    />
                                </svg>
                                <svg
                                    class="icon-muted hidden"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                    <line x1="23" y1="9" x2="17" y2="15" />
                                    <line x1="17" y1="9" x2="23" y2="15" />
                                </svg>
                            </button>
                            <div id="sound-popup" class="sound-popup hidden">
                                <div class="sound-popup-row">
                                    <label for="volume-slider">Volume</label>
                                    <input
                                        type="range"
                                        id="volume-slider"
                                        min="0"
                                        max="100"
                                        value="50"
                                    />
                                    <span id="volume-value">50%</span>
                                </div>
                                <div class="sound-popup-row">
                                    <label>Mute</label>
                                    <label class="toggle-switch">
                                        <input
                                            type="checkbox"
                                            id="mute-toggle"
                                        />
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                                <div class="sound-popup-row">
                                    <label>Drive Sounds</label>
                                    <label class="toggle-switch">
                                        <input
                                            type="checkbox"
                                            id="drive-sounds-toggle"
                                            checked
                                        />
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <button
                            id="btn-display"
                            class="control-btn display-btn"
                            title="Display Settings"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect
                                    x="2"
                                    y="3"
                                    width="20"
                                    height="14"
                                    rx="2"
                                    ry="2"
                                />
                                <line x1="8" y1="21" x2="16" y2="21" />
                                <line x1="12" y1="17" x2="12" y2="21" />
                            </svg>
                            <span>Display</span>
                        </button>
                    </div>
                    <div class="control-group">
                        <button
                            id="btn-cpu-debug"
                            class="control-btn debugger-btn"
                            title="CPU Debugger"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect
                                    x="4"
                                    y="4"
                                    width="16"
                                    height="16"
                                    rx="2"
                                />
                                <rect x="9" y="9" width="6" height="6" />
                                <path
                                    d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"
                                />
                            </svg>
                            <span>CPU</span>
                        </button>
                        <button
                            id="btn-drive-debug"
                            class="control-btn debugger-btn"
                            title="Drive Monitor"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect
                                    x="2"
                                    y="4"
                                    width="20"
                                    height="16"
                                    rx="2"
                                />
                                <circle cx="12" cy="12" r="4" />
                                <circle cx="12" cy="12" r="1" />
                            </svg>
                            <span>Drives</span>
                        </button>
                        <button
                            id="btn-switch-debug"
                            class="control-btn debugger-btn"
                            title="Soft Switches"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <rect x="3" y="3" width="7" height="7" />
                                <rect x="14" y="3" width="7" height="7" />
                                <rect x="3" y="14" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" />
                            </svg>
                            <span>Switches</span>
                        </button>
                    </div>
                </nav>
            </header>

            <main>
                <div class="emulator-section">
                    <div id="monitor-frame">
                        <div class="monitor-bezel">
                            <div class="monitor-screen-wrapper">
                                <canvas id="screen"></canvas>
                                <div class="scanlines"></div>
                                <div class="screen-glare"></div>
                            </div>
                            <div class="monitor-badge">
                                <span>Apple //e</span>
                            </div>
                            <div class="monitor-power">
                                <span
                                    class="power-led"
                                    id="monitor-power-led"
                                ></span>
                                <span class="power-label">POWER</span>
                            </div>
                        </div>
                        <div class="monitor-base">
                            <div class="monitor-stand"></div>
                        </div>
                    </div>

                    <div id="disk-drives">
                        <div class="disk-drive" id="disk1">
                            <div class="drive-image-container">
                                <img
                                    class="drive-image"
                                    src="assets/drive-open.svg"
                                    alt="Disk Drive 1"
                                />
                            </div>
                            <div class="drive-info">
                                <span class="drive-label">Drive 1</span>
                                <span class="disk-name">No Disk</span>
                                <span class="disk-track" title="Current Track"
                                    >T--</span
                                >
                            </div>
                            <div class="drive-controls">
                                <input
                                    type="file"
                                    id="disk1-input"
                                    accept=".dsk,.do,.po,.woz,.nib"
                                    hidden
                                />
                                <button
                                    class="disk-insert"
                                    title="Insert Disk from File"
                                >
                                    Insert
                                </button>
                                <button
                                    class="disk-blank"
                                    title="Insert Blank Disk"
                                >
                                    Blank
                                </button>
                                <button
                                    class="disk-eject"
                                    disabled
                                    title="Eject Disk"
                                >
                                    Eject
                                </button>
                            </div>
                        </div>
                        <div class="disk-drive" id="disk2">
                            <div class="drive-image-container">
                                <img
                                    class="drive-image"
                                    src="assets/drive-open.svg"
                                    alt="Disk Drive 2"
                                />
                            </div>
                            <div class="drive-info">
                                <span class="drive-label">Drive 2</span>
                                <span class="disk-name">No Disk</span>
                                <span class="disk-track" title="Current Track"
                                    >T--</span
                                >
                            </div>
                            <div class="drive-controls">
                                <input
                                    type="file"
                                    id="disk2-input"
                                    accept=".dsk,.do,.po,.woz,.nib"
                                    hidden
                                />
                                <button
                                    class="disk-insert"
                                    title="Insert Disk from File"
                                >
                                    Insert
                                </button>
                                <button
                                    class="disk-blank"
                                    title="Insert Blank Disk"
                                >
                                    Blank
                                </button>
                                <button
                                    class="disk-eject"
                                    disabled
                                    title="Eject Disk"
                                >
                                    Eject
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer>
                <span>Apple //e Emulator</span>
                <span class="separator">|</span>
                <span>Press <kbd>F1</kbd> for keyboard help</span>
            </footer>

            <div id="loading">
                <div class="loader">
                    <div class="loader-ring"></div>
                    <div class="loader-ring"></div>
                    <div class="loader-ring"></div>
                </div>
                <p>Initializing Apple //e...</p>
            </div>

            <!-- Save Disk Modal -->
            <div id="save-disk-modal" class="modal hidden">
                <div class="modal-backdrop"></div>
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Save Disk Image?</h3>
                    </div>
                    <div class="modal-body">
                        <p>
                            This disk has been modified. Would you like to save
                            it before ejecting?
                        </p>
                        <div class="modal-input-group">
                            <label for="save-disk-filename">Filename:</label>
                            <input
                                type="text"
                                id="save-disk-filename"
                                placeholder="disk.dsk"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            id="save-disk-cancel"
                            class="modal-btn modal-btn-secondary"
                        >
                            Don't Save
                        </button>
                        <button
                            id="save-disk-confirm"
                            class="modal-btn modal-btn-primary"
                        >
                            Save
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="/a2e.js"></script>
        <script type="module" src="/src/js/main.js"></script>
    </body>
</html>
