<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Apple II Enhanced emulator for the browser"
        />
        <meta name="theme-color" content="#0a0a0b" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="Apple //e" />
        <title>Apple //e Emulator</title>
        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
        <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="app">
            <header>
                <div class="header-left">
                    <div class="logo">
                        <img
                            class="logo-image"
                            src="/assets/apple-logo.png"
                            alt="Apple //e"
                        />
                        <span id="app-version" class="app-version"></span>
                    </div>
                    <!--<span class="tagline">Apple II Enhanced Emulator</span>-->
                    <a
                        href="https://RetroTech71.co.uk"
                        target="_blank"
                        rel="noopener"
                        class="retro-brand"
                    >
                        <span
                            class="retro-brand-text"
                            data-text="RetroTech71.co.uk"
                            >RetroTech71.co.uk</span
                        >
                    </a>
                </div>
                <nav class="header-controls">
                    <!-- Power, Reset, Reboot (standalone top-level buttons) -->
                    <button
                        id="btn-power"
                        class="control-btn power-btn off"
                        title="Power On"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.8 0" />
                        </svg>
                    </button>
                    <button
                        id="btn-warm-reset"
                        class="header-text-btn"
                        title="Ctrl+Reset (warm reset, preserves memory)"
                    >
                        Ctrl+Reset
                    </button>
                    <button
                        id="btn-cold-reset"
                        class="header-text-btn"
                        title="Cold Reset (full restart)"
                    >
                        Reboot
                    </button>

                    <!-- File menu (state management) -->
                    <div class="header-menu-container" id="file-menu-container">
                        <button class="header-menu-trigger" id="btn-file-menu">
                            <span>File</span>
                            <svg
                                class="menu-chevron"
                                viewBox="0 0 12 12"
                                width="10"
                                height="10"
                            >
                                <path
                                    d="M3 5l3 3 3-3"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                            </svg>
                        </button>
                        <div class="header-menu" id="file-menu">
                            <div class="header-menu-item menu-toggle-item">
                                <div class="state-row-label">
                                    <span>Auto-Save</span>
                                    <span class="state-row-hint"
                                        >Save every 5 seconds</span
                                    >
                                </div>
                                <label class="toggle-switch">
                                    <input
                                        type="checkbox"
                                        id="autosave-toggle"
                                        checked
                                    />
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="header-menu-separator"></div>
                            <button
                                class="header-menu-item"
                                id="btn-save-states"
                            >
                                <span>Save States...</span>
                            </button>
                            <div
                                id="state-last-saved"
                                class="header-menu-footer"
                            ></div>
                        </div>
                    </div>

                    <!-- View menu -->
                    <div class="header-menu-container" id="view-menu-container">
                        <button class="header-menu-trigger" id="btn-view-menu">
                            <span>View</span>
                            <svg
                                class="menu-chevron"
                                viewBox="0 0 12 12"
                                width="10"
                                height="10"
                            >
                                <path
                                    d="M3 5l3 3 3-3"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                            </svg>
                        </button>
                        <div class="header-menu" id="view-menu">
                            <div
                                class="header-menu-item menu-toggle-item theme-selector-row"
                            >
                                <span>Theme</span>
                                <div class="theme-btn-group">
                                    <button
                                        class="theme-btn"
                                        data-theme="light"
                                        title="Light"
                                    >
                                        <svg
                                            viewBox="0 0 16 16"
                                            width="14"
                                            height="14"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        >
                                            <circle cx="8" cy="8" r="3.5" />
                                            <path
                                                d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.17 3.17l1.06 1.06M11.77 11.77l1.06 1.06M3.17 12.83l1.06-1.06M11.77 4.23l1.06-1.06"
                                            />
                                        </svg>
                                    </button>
                                    <button
                                        class="theme-btn"
                                        data-theme="dark"
                                        title="Dark"
                                    >
                                        <svg
                                            viewBox="0 0 16 16"
                                            width="14"
                                            height="14"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        >
                                            <path
                                                d="M13.5 8.5a5.5 5.5 0 0 1-7-7 6 6 0 1 0 7 7z"
                                            />
                                        </svg>
                                    </button>
                                    <button
                                        class="theme-btn"
                                        data-theme="system"
                                        title="System"
                                    >
                                        <svg
                                            viewBox="0 0 16 16"
                                            width="14"
                                            height="14"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="1.5"
                                        >
                                            <rect
                                                x="2"
                                                y="3"
                                                width="12"
                                                height="9"
                                                rx="1.5"
                                            />
                                            <path d="M6 14h4" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="header-menu-separator"></div>
                            <button class="header-menu-item" id="btn-drives">
                                <span>Disk Drives</span>
                            </button>
                            <button class="header-menu-item" id="btn-hard-drives">
                                <span>SmartPort Drives</span>
                            </button>
                            <button
                                class="header-menu-item"
                                id="btn-file-explorer"
                            >
                                <span>File Explorer</span>
                            </button>
                            <div class="header-menu-separator"></div>
                            <button class="header-menu-item" id="btn-display">
                                <span>Display</span>
                            </button>
                            <button class="header-menu-item" id="btn-joystick">
                                <span>Joystick / Paddles</span>
                            </button>
                            <button class="header-menu-item" id="btn-slots">
                                <span>Expansion Slots</span>
                            </button>
                        </div>
                    </div>

                    <!-- Debug menu -->
                    <div
                        class="header-menu-container"
                        id="debug-menu-container"
                    >
                        <button class="header-menu-trigger" id="btn-debug-menu">
                            <span>Debug</span>
                            <svg
                                class="menu-chevron"
                                viewBox="0 0 12 12"
                                width="10"
                                height="10"
                            >
                                <path
                                    d="M3 5l3 3 3-3"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                            </svg>
                        </button>
                        <div class="header-menu" id="debug-menu">
                            <button class="header-menu-item" data-window="cpu">
                                CPU Debugger
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="switches"
                            >
                                Soft Switches
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="memmap"
                            >
                                Memory Map
                            </button>
                            <div class="header-menu-separator"></div>
                            <button
                                class="header-menu-item"
                                data-window="memory"
                            >
                                Memory Browser
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="heatmap"
                            >
                                Memory Heat Map
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="stack"
                            >
                                Stack Viewer
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="zeropage"
                            >
                                Zero Page Watch
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="trace"
                            >
                                Instruction Trace
                            </button>
                            <div class="header-menu-separator"></div>
                            <button
                                class="header-menu-item"
                                data-window="mockingboard"
                            >
                                Mockingboard
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="mouse-card"
                            >
                                Mouse Card
                            </button>
                        </div>
                    </div>

                    <!-- Tools menu -->
                    <div class="header-menu-container" id="dev-menu-container">
                        <button class="header-menu-trigger" id="btn-dev-menu">
                            <span>Dev</span>
                            <svg
                                class="menu-chevron"
                                viewBox="0 0 12 12"
                                width="10"
                                height="10"
                            >
                                <path
                                    d="M3 5l3 3 3-3"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                            </svg>
                        </button>
                        <div class="header-menu" id="dev-menu">
                            <button
                                class="header-menu-item"
                                data-window="basic"
                            >
                                Applesoft BASIC
                            </button>
                            <button
                                class="header-menu-item"
                                data-window="assembler"
                            >
                                Assembler
                            </button>
                        </div>
                    </div>

                    <!-- Standalone buttons -->
                    <div class="control-group">
                        <button
                            id="btn-fullscreen"
                            class="control-btn"
                            title="Full Page Mode (Ctrl+Escape to exit)"
                            aria-label="Full Page Mode"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                            >
                                <path
                                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                                />
                            </svg>
                        </button>
                        <div class="sound-control-wrapper">
                            <button
                                id="btn-sound"
                                class="control-btn"
                                title="Sound Settings"
                                aria-label="Sound Settings"
                            >
                                <svg
                                    class="icon-unmuted"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                    <path
                                        d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"
                                    />
                                </svg>
                                <svg
                                    class="icon-muted hidden"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <path d="M11 5L6 9H2v6h4l5 4V5z" />
                                    <line x1="23" y1="9" x2="17" y2="15" />
                                    <line x1="17" y1="9" x2="23" y2="15" />
                                </svg>
                            </button>
                            <div id="sound-popup" class="sound-popup hidden">
                                <div class="sound-popup-row">
                                    <label for="volume-slider">Volume</label>
                                    <input
                                        type="range"
                                        id="volume-slider"
                                        min="0"
                                        max="100"
                                        value="50"
                                    />
                                    <span id="volume-value" aria-live="polite"
                                        >50%</span
                                    >
                                </div>
                                <div class="sound-popup-row">
                                    <label>Mute</label>
                                    <label class="toggle-switch">
                                        <input
                                            type="checkbox"
                                            id="mute-toggle"
                                        />
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                                <div class="sound-popup-row">
                                    <label>Drive Sounds</label>
                                    <label class="toggle-switch">
                                        <input
                                            type="checkbox"
                                            id="drive-sounds-toggle"
                                            checked
                                        />
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <button
                            id="btn-agent"
                            class="control-btn agent-btn disconnected"
                            title="Connect to Agent - The Agent MCP Server must be Running"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                width="16"
                                height="16"
                                fill="currentColor"
                            >
                                <path
                                    d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5L12 2zM6 16l.75 2.25L9 19l-2.25.75L6 22l-.75-2.25L3 19l2.25-.75L6 16zM18 16l.75 2.25L21 19l-2.25.75L18 22l-.75-2.25L15 19l2.25-.75L18 16z"
                                />
                            </svg>
                        </button>
                    </div>

                    <!-- Help menu -->
                    <div class="header-menu-container" id="help-menu-container">
                        <button
                            class="header-menu-trigger"
                            id="btn-help-menu"
                            title="Help (F1)"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                width="14"
                                height="14"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            >
                                <circle cx="12" cy="12" r="10" />
                                <path
                                    d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"
                                />
                                <line x1="12" y1="17" x2="12.01" y2="17" />
                            </svg>
                            <span class="update-badge" id="update-badge"></span>
                            <svg
                                class="menu-chevron"
                                viewBox="0 0 12 12"
                                width="10"
                                height="10"
                            >
                                <path
                                    d="M3 5l3 3 3-3"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                />
                            </svg>
                        </button>
                        <div
                            class="header-menu header-menu-right"
                            id="help-menu"
                        >
                            <button class="header-menu-item" id="btn-help">
                                <span>Documentation</span>
                                <span class="menu-hint">F1</span>
                            </button>
                            <button
                                class="header-menu-item"
                                id="btn-release-notes-menu"
                            >
                                <span>Release Notes</span>
                            </button>
                            <div class="header-menu-separator"></div>
                            <button class="header-menu-item" id="btn-update">
                                <span>Check for Updates</span>
                            </button>
                        </div>
                    </div>
                </nav>
            </header>

            <main>
                <div class="emulator-section">
                    <div id="monitor-frame">
                        <canvas id="screen"></canvas>
                    </div>
                </div>
            </main>

            <!-- Full page mode toolbar (auto-hiding) -->
            <div class="full-page-toolbar-wrapper">
                <div class="full-page-toolbar-trigger"></div>
                <div class="full-page-toolbar" id="full-page-toolbar">
                    <button
                        id="fp-power"
                        class="fp-toolbar-btn fp-power-btn off"
                        title="Power"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                        >
                            <path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.8 0" />
                        </svg>
                    </button>
                    <div class="fp-toolbar-separator"></div>
                    <button
                        id="fp-warm-reset"
                        class="fp-toolbar-btn fp-text-btn"
                        title="Ctrl+Reset (warm reset)"
                    >
                        Ctrl+Reset
                    </button>
                    <button
                        id="fp-cold-reset"
                        class="fp-toolbar-btn fp-text-btn"
                        title="Cold Reset (full restart)"
                    >
                        Reboot
                    </button>
                    <div class="fp-toolbar-separator"></div>
                    <button
                        id="fp-exit"
                        class="fp-toolbar-btn fp-text-btn fp-exit-btn"
                        title="Exit Full Page Mode"
                    >
                        Exit
                    </button>
                </div>
            </div>


            <div id="loading">
                <div class="loader">
                    <div class="loader-ring"></div>
                    <div class="loader-ring"></div>
                    <div class="loader-ring"></div>
                </div>
                <p>Initializing Apple //e...</p>
            </div>

            <!-- Power On Reminder -->
            <div id="power-reminder" class="power-reminder hidden">
                <div class="reminder-content">
                    <div class="reminder-icon">⚡</div>
                    <div class="reminder-text">
                        <span class="reminder-title">Ready to go!</span>
                        <span class="reminder-hint"
                            >Click the <strong>power button</strong> to start
                            the Apple //e</span
                        >
                    </div>
                </div>
                <div class="reminder-arrow"></div>
            </div>

            <div id="basic-reminder" class="floating-reminder hidden">
                <div class="reminder-content">
                    <div class="reminder-text">
                        <span class="reminder-hint"
                            >No disk? Press <strong>Ctrl+Reset</strong> for
                            Apple II BASIC</span
                        >
                    </div>
                </div>
                <div class="reminder-arrow"></div>
            </div>

            <!-- Save Disk Modal -->
            <dialog id="save-disk-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Save Disk Image?</h3>
                    </div>
                    <div class="modal-body">
                        <p>
                            This disk has been modified. Would you like to save
                            it before ejecting?
                        </p>
                        <div class="modal-input-group">
                            <label for="save-disk-filename">Filename:</label>
                            <input
                                type="text"
                                id="save-disk-filename"
                                placeholder="disk.dsk"
                            />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button
                            id="save-disk-cancel"
                            class="modal-btn modal-btn-secondary"
                        >
                            Don't Save
                        </button>
                        <button
                            id="save-disk-confirm"
                            class="modal-btn modal-btn-primary"
                        >
                            Save
                        </button>
                    </div>
                </div>
            </dialog>
        </div>

        <script src="/a2e.js"></script>
        <script type="module" src="/src/js/main.js"></script>
    </body>
</html>
